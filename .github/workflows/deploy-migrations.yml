name: Deploy migrations

# Applies supabase/migrations to the hosted DB on every merge to the default
# branch. This is the fix for the drift that produced 0005_fix_reactions:
# migration 0002 was never hand-pasted into prod, so reactions silently broke.
# CI push means the DB always matches what's committed — no manual SQL-editor
# step to forget.
#
# Required repository secrets:
#   SUPABASE_ACCESS_TOKEN   — personal access token (Account → Access Tokens)
#   SUPABASE_PROJECT_REF    — the project ref (e.g. srrmjrmilibdnkegrloe)
#   SUPABASE_DB_PASSWORD    — database password (for `supabase db push`)
on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/deploy-migrations.yml'

# Never run two migration deploys concurrently against the same DB.
concurrency:
  group: deploy-migrations
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push
