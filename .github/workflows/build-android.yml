name: Build Android APK

# Builds an installable APK for sideload distribution via GitHub (NOT Play
# Store). android/ is gitignored (Expo-generated), so the job regenerates it
# with `expo prebuild`, then `assembleRelease`. The Expo template signs the
# release variant with the debug keystore, so no release keystore is needed —
# the APK installs on any device but is NOT Play-Store uploadable. Add a real
# keystore + AGP injected signing when you go to the Play Store.
#
# Required repository secrets (inlined into the JS bundle at build time):
#   GOOGLE_SERVICES_JSON_BASE64  — base64 of google-services.json (gitignored)
#   EXPO_PUBLIC_SUPABASE_URL
#   EXPO_PUBLIC_SUPABASE_ANON_KEY
#   EXPO_PUBLIC_GIPHY_API_KEY

on:
  # Manual trigger, and on version tags (v1.2.3).
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      # google-services.json is gitignored — restore it from a secret so
      # prebuild + the FCM/expo-notifications config can find it.
      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > google-services.json

      # Regenerate the native android/ project from app.json.
      - name: Prebuild (android)
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_GIPHY_API_KEY: ${{ secrets.EXPO_PUBLIC_GIPHY_API_KEY }}
        run: npx expo prebuild --platform android --no-install

      # assembleRelease. EXPO_PUBLIC_* are inlined into the JS bundle Metro
      # produces during this step. Signed with the debug keystore (see header).
      - name: Build release APK
        working-directory: android
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_GIPHY_API_KEY: ${{ secrets.EXPO_PUBLIC_GIPHY_API_KEY }}
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
