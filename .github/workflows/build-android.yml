name: Build Android APK

# Builds a release-signed APK with the native Gradle toolchain (no EAS Build).
# android/ is gitignored (Expo-generated), so the job regenerates it with
# `expo prebuild` and signs via AGP's injected signing properties — this avoids
# patching the generated build.gradle, which prebuild would overwrite.
#
# Required repository secrets:
#   ANDROID_KEYSTORE_BASE64      — base64 of the release keystore (.jks)
#   ANDROID_KEYSTORE_PASSWORD    — keystore store password
#   ANDROID_KEY_ALIAS            — key alias inside the keystore
#   ANDROID_KEY_PASSWORD         — key password (often same as store password)
#   GOOGLE_SERVICES_JSON_BASE64  — base64 of google-services.json (gitignored)
#   EXPO_PUBLIC_SUPABASE_URL     — inlined into the JS bundle at build time
#   EXPO_PUBLIC_SUPABASE_ANON_KEY
#   EXPO_PUBLIC_GIPHY_API_KEY

on:
  # Manual trigger, and on version tags (v1.2.3).
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      # google-services.json is gitignored — restore it from a secret so
      # prebuild + the FCM/expo-notifications config can find it.
      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > google-services.json

      # Regenerate the native android/ project from app.json.
      - name: Prebuild (android)
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_GIPHY_API_KEY: ${{ secrets.EXPO_PUBLIC_GIPHY_API_KEY }}
        run: npx expo prebuild --platform android --no-install

      # Decode the release keystore to a file the Gradle build can read.
      - name: Restore keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"

      # assembleRelease with AGP injected signing — overrides the debug signing
      # the Expo template puts on the release variant, without editing build.gradle.
      # EXPO_PUBLIC_* are inlined into the JS bundle Metro produces during this step.
      - name: Build release APK
        working-directory: android
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_GIPHY_API_KEY: ${{ secrets.EXPO_PUBLIC_GIPHY_API_KEY }}
          STORE_FILE: ${{ runner.temp }}/release.jks
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$STORE_FILE" \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
